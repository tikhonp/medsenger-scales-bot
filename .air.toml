root = "."
tmp_dir = "/tmp"

[build]
pre_cmd = ["templ generate", "go build -o /bin/manage ./cmd/manage"]
cmd = "go build -o /tmp/main ./cmd/server/main.go"
entrypoint = "/tmp/main"
include_ext = ["go", "templ"]
exclude_regex = ["_templ\\.go"]
exclude_dir = ["pkl", "db/migrations", "public", "view/css"]
